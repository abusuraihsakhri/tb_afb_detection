<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepZoom Viewer | TB WSI Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
    <style>
        #openseadragon-viewer {
            width: 100%;
            height: 90vh;
            background-color: #f1f5f9;
            border-radius: 12px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.05);
        }
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="app-container glassmorphism" style="max-width: 95vw;">
        <header class="viewer-header">
            <div>
                <h1>DeepZoom <span class="highlight">WSI</span> Navigator</h1>
                <p style="margin-top: 5px; font-weight: 600; color: var(--accent-vibrant); font-size: 1rem;">Developed by Dr. Abu Suraih Sakhri</p>
                <p id="slide-info">Slide ID: Loading...</p>
            </div>
            <a href="index.html" class="glass-btn" style="text-decoration: none; padding: 10px 20px; background: white; border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-main); font-weight: 600;">Return to Dashboard</a>
        </header>

        <div id="openseadragon-viewer"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const wsiId = urlParams.get('id');
        
        if (!wsiId) {
            document.getElementById('slide-info').textContent = "Error: No Slide ID provided.";
        } else {
            document.getElementById('slide-info').textContent = `Slide ID: ${wsiId}`;
            
            const viewer = OpenSeadragon({
                id: "openseadragon-viewer",
                prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
                tileSources: {
                    height: 50000, // Fallback, real size should come from API if possible
                    width: 50000,
                    tileSize: 254,
                    tileOverlap: 1,
                    getTileUrl: function(level, x, y) {
                        return `/api/v1/wsi/tile/${wsiId}/${level}/${x}/${y}`;
                    }
                },
                showNavigator: true,
                navigatorPosition: "BOTTOM_RIGHT",
                animationTime: 0.5,
                blendingTime: 0.1,
                constrainDuringPan: true,
                maxZoomPixelRatio: 2,
                visibilityRatio: 1,
                zoomPerScroll: 2
            });
        }
    </script>
</body>
</html>
